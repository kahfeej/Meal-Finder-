<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>  </title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#e3ab2f">

</head>
<style>
    :root{
        --bg: #f6efe6;
        --paper: #f7f0e7;
        --surface: rgba(247,240,231,0.96);
        --card: #ffffff;
        --border: #eadfce;
        --text: #262320;
        --muted: #6f675f;
        --accent: #e3ab2f;
        --accent-hover: #d79b18;
        --purple: #5b49d6;
        --purple-hover: #4d3dc1;
        --shadow: 0 10px 28px rgba(40, 28, 18, 0.10);
        --radius-1g: 28px;

    }

    *,
    *::before,
    *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
    }
    
    body{
        font-family: 'DM Sans', sans-serif;
        color: var(--text);
        min-height: 100vh;
        background: 
        linear-gradient(rgba(246, 239, 230, 0.30), rgba(246, 239, 230, 0.78)),
       url("https://images.unsplash.com/photo-1504674900247-0877df9cc836?auto=format&fit=crop&w=1600&q=80");
       background-size: cover;
       background-position: center top;
       background-attachment: fixed;
    }

    nav{
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 1.2rem 3rem;
        background: rgba(248, 242, 234, 0.96);
        border-bottom: 1px solid var(--border);
        position: sticky;
        top: 0;
        z-index: 100;
    }

    .logo{
        display: flex;
        align-items: center;
        gap: 12px;
        font-family: 'Playfair Display', serif;
        font-size: 2rem;
        font-weight: 700;
        color: var(--text);
    }

    .logo-icon{
        width: 42px;
        height: 42px;
        border-radius: 50%;
        background: linear-gradient(135deg, #f3d27a, #e3ab2f);
        color: #4a3312;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 1rem;
        font-weight: 700;
    }

    .logo-text{
        line-height: 1;
    }

    .navtab{
        display: flex;
        align-items: center;
        gap: 0.9rem;
    }


    .btn-primary,
    .btn-secondary{
        border: none;
        border-radius: 999px;
        padding: 0.85rem 1.35rem;
        font-size: 0.95rem;
        font-weight: 700;
        cursor: pointer;
        transition: 0.2s ease;
    }

    .btn-primary{
        background: var(--purple);
        color: white;
    }

    .btn-primary:hover{
        background: var(--purple-hover);
    }

    .btn-secondary{
        background: #f4ece2;
        color: var(--text);
        border: 1px solid var(--border);

    }

    .btn-secondary:hover{
        background: #efe4d8;
    }

    #hero{
        max-width: 930px;
        margin: 4rem auto 2.5rem;
        padding: 3.5rem 2.5rem;
        text-align: center;
        background: var(--surface);
        border-radius: var(--radius-1g);
        box-shadow: var(--shadow);
    }

    #hero h1{
        font-family: 'Playfair Display', serif;
        font-size: clamp(3rem, 6vw, 4.8rem);
        margin-bottom: 0.8rem;
    }

    #hero h1 em{
        color: var(--accent);
        font-style: italic;
    }

    #hero h4{
        color: var(--muted);
        font-weight: 400;
        margin-bottom: 2rem;
    }


    .search{
        display: flex;
        gap: 0.9rem;
        max-width: 780px;
        margin: 0 auto 1.6rem;
    }

    .search input{
        flex: 1;
        height: 72px;
        padding: 0 1.5rem;
        border-radius: 999px;
        border: none;
        background: #fff;
        color: var(--text);
        font-size: 1rem;
        outline: none;
        box-shadow: inset 0 0 0 1px #ece5db;
    }

    .search input:focus{
        box-shadow: inset 0 0 0 2px var(--accent);
    }

    #btnsearch{
        min-width: 150px;
        height: 72px;
        background: var(--accent);
        color: #2d2419;
    }

    #btnsearch:hover{
        background: var(--accent-hover);
    }


    .filterrow{
        display: flex;
        justify-content: center;
        flex-wrap: wrap;
        gap: 0.95rem;
    }

    .btncat,
    .btncatactive{
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-width: 110px;
        padding: 0.8rem 1.2rem;
        border-radius: 16px;
        border: 2px solid var(--border);
        background: white;
        color: var(--text);
        cursor: pointer;
        font-size: 0.95rem;
        font-weight: 700;
        transition: 0.2s ease;
    }
   
    .btncat:hover{
        transform: translateY(-2px);
        box-shadow:0 6px 14px rgba(0,0,0,0.5)
    }

    .btncatactive{
        border-color: var(--accent);
        box-shadow: 0 4px 10px rgba(227,171,47,0.2);
    }
    
    .mainsection{
        max-width: 1240px;
        margin:0 auto;
        padding:2rem 3rem;
    }

    .tabs{
        display: flex;
        gap:0.8rem;
        margin-bottom: 1.5rem;
    }

    .tab,
    .tabactive{
        padding: 0.85rem 1.2rem;
        border: 1px solid var(--border);
        border-radius: 999px;
        cursor: pointer;
        font-size: 0.95rem;
        font-weight: 700;
        background: #fff;
        color: var(--text);
        box-shadow: 0 6px 16px rgba(0,0,0,0.6);
    }

    .tab{
        background: #efe5d8;
        color: var(--muted);
    }

    .section-title{
        font-size: 2rem;
        color: var(--text);
        margin-bottom: 1.4rem;
    }

    .grid{
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
        gap: 1.6rem;
    }

    .card{
        background: white;
        border-radius: 18px;
        overflow: hidden;
        cursor: pointer;
        box-shadow: 0 8px 20px rgba(0,0,0,0.08);
        transition: 0.2s ease;
    }

    .card:hover{
        transform: translateY(-4px);
    }

    .card img{
        width: 100%;
        aspect-ratio: 1 / 1;
        object-fit: cover;
        display: block;
    }

    .card-body{
        padding: 1rem;
    }

    .card-name{
        font-family: 'Playfair Display', serif;
        font-size: 1.2rem;
    }

    .card-meta,
    .instructions{
        color:var(--muted);
    }
    .card-meta{
        margin: 0.5rem 0 0.8rem;
        font-size: 0.95rem;
    }

    .card-actions,
    .ingredients,
    .savefav{
        display: flex;
        gap: 0.6rem;
        align-items: center;
    }

    .fav-btn{
        background: #f7efe5;
        border: 1px solid var(--border);
        border-radius: 999px;
        color: var(--muted);
        padding: 0.55rem 0.95rem;
        cursor:pointer;
        font-size: 0.9rem;
    }
    
    .fav-btn:hover,
    .fav-btn.active{
        background-color: #efe4d8;
        color: var(--text);
    }

    .overlay{
        display: none;
        position: fixed;
        inset: 0;
        padding: 1rem;
        background: rgba(0,0,0,.55);
        justify-content: center;
        align-items: center;
    }

    .overlay.open{
        display: flex;
    }

    .modal{
        background: #fffaf5;
        border-radius: 20px;
        width: min(700px, 100%);
        max-height: 88vh;
        overflow: auto;
    }

    .modalimg{
        width: 100%;
        max-height: 280px;
        object-fit: cover;
        display: block;
    }

    .modalbody{padding:1.4rem;}
    .modalbody h2{font-size: 2rem;margin-bottom: .3rem;}
    .modalbody h3{font-size: 1.1rem;margin: 1rem 0 .5rem;}

    .modalclose{
        float: right;
        border: none;
        background: none;
        font-size: 1.3rem;
        cursor: pointer;
    }

    .badge,.ingredient-tag{
        display: inline-block;
        border: 1px solid var(--border);
    }
    
    .badge{
        padding: .35rem .85rem;
        border-radius: 10px;
        background: #f4eadf;
        color: var(--text);
        font-size: .88rem;
    }

    .instructions{
        line-height: 1.7;
    }

    .loginform{
        display: flex;
        flex-direction: column;
        gap: 1rem;
    }

    .loginform input{
        width: 100%;
        padding: .85rem 1rem;
        border: 1px solid(--var);
        border-radius: 12px;
        margin-top: .35rem;
    }

    .loginform input{
        width:100%;
        padding:.85rem 1rem;
        border:1px solid var(--border);
        border-radius:12px;
        margin-top:.35rem;

}

.loginerror{
    color:#e74c3c;
    display:none;
}

.spinner{
    width:40px;
    height:40px;
    margin:3rem auto;
    border:3px solid #eadfce;
    border-top-color:var(--accent);
    border-radius:50%;
    animation:spin .75s linear infinite;
}

@keyframes spin{
    to{transform:rotate(360deg);}
}

#toast{
    position:fixed;
    bottom:20px;
    left:50%;
    transform:translateX(-50%);
    background:var(--purple);
    color:#fff;
    padding:.7rem 1.2rem;
    border-radius:999px;
    display:none;
}

#toast.show{display:block;}
    @media(max-width: 900px) {
    nav{
            padding: 1rem;
    }

    #hero{
        margin: 2rem 1rem;
        padding: 2rem;
    }

    .search{
        flex-direction: column;
    }
    .grid{
        grid-template-columns: 1fr;
    
    }
    .tabs{
        flex-wrap: wrap;
    }

    }
</style>

<body>
<nav>
    <div class="logo"> 
        <span class="logo-icon">M</span>
        <span class="logo-text">Meal Finder</span>
    </div>
    <div class="navtab">
        <button class="btn-primary" id="btnlogin" onclick="openLogin()">Login</button>
        <button class="btn-secondary" id="btnfav" onclick="showFav()">Favourites</button>
        <button class="btn-secondary" id="btnlogout" onclick="logout()">Logout</button>
    </div>
</nav>

<section id="hero">
    <h1>Your next <em>meal</em> starts here</h1>
    <h4>Discover recipes made simple </h4>
    <div class="search">
        <input type="text" id="searchinput" placeholder="Search by meal or ingredient" oninput="debounceSearch()"/>
        <button class="btn-secondary" id="btnsearch" onclick="doSearch()">Search</button>
    </div>
    <div class="filterrow">
        <span class="btncatactive" onclick="setFilter('', this)">All</span>
        <span class="btncat" onclick="setFilter('Beef', this)">🥩Beef</span>
        <span class="btncat" onclick="setFilter('Chicken', this)">🍗Chicken</span>
        <span class="btncat" onclick="setFilter('Seafood', this)">🦞Seafood</span>
        <span class="btncat" onclick="setFilter('Vegetarian', this)">🥗Vegetarian</span>
        <span class="btncat" onclick="setFilter('Dessert', this)">🍨Dessert</span>
    </div>
</section>

<main class="mainsection">
    <div class="tabs" id="maintabs">
        <button class="tabactive" id="tabsearch" onclick="switchTab(search)">Results</button>
        <button class="tab" id="tabfavs" onclick="switchTab(favs)">My Favourites</button>
    </div>
    <div id="panelsearch">
        <div class="section-title">Popular Recipes</div>
        <div class="grid" id="results-grid">
            <div class="spinner"></div>
        </div>
    </div>
    <div id="panelfavs">
       <div class="section-title">My Saved Recipes</div>
        <div class="grid" id="favs-grid"></div> 
    </div>
</main>

<div class="overlay" id="detailoverlay" onclick="closeDetails(event)">
    <div class="modal" id="detailmodal">
        <img id="img" class="modalimg" src="" alt=""/>
        <div class="modalbody">
            <button class="modalclose" onclick="closeDetailBtn()">✕</button>
            <h2 id="dname"></h2>
            <span class="badge" id="dcategory"></span>
            <h3>Ingredients</h3>
            <div class="ingredients" id="d-ingredients"></div>
            <h3>Instructions</h3>
            <p class="instructions" id="d-instructions"></p>
            <div class="savefav">
                <button class="btn-primary" id="dfav-btn" onclick="saveFavFromDetail()">Save to Favourites</button>
                <span id="dglass"></span>
            </div>
        </div>
    </div>
</div>

<div class="overlay" id="loginoverlay" onclick="closeLogin(event)">
    <div class="modal" id="loginmodal">
        <div class="modalbody">
            <button class="modalclose" onclick="document.getElementById('loginoverlay').classList.remove('open')">✕</button>
            <h2>Welcome Back</h2>
            <div class="loginform">
                <label>
                    Email
                    <input type="text" id="loginuser" placeholder="bob@mail.com"/>
                </label>
                <label>
                    Password
                    <input type="text" id="loginpass" placeholder="bobpass"/>
                </label>
                <p class="loginerror" id="loginerror">Invalid information</p>
                <button class="btn-primary" onclick="doLogin()">Login</button>
            </div>
        </div>
    </div>
</div>

<div id="toast">Saved</div>


<script>
const API= 'https://www.themealdb.com/api/json/v1/1';
let currentUser= null,
    favourites= JSON.parse(localStorage.getItem('favourites')) ||{},
    currentMeal= null,
    searchTimer= null,
    activeFilter='';

const search = 'search';
const favs = 'favs';


function openLogin(){
    document.getElementById('loginoverlay').classList.add('open');
    document.getElementById('loginerror').style.display='none';
}

function closeLogin(e){
    if (e.target===document.getElementById('loginoverlay'))
        document.getElementById('loginoverlay').classList.remove('open');
}

function doLogin(){
    const u=document.getElementById('loginuser').value.trim().toLowerCase();
    const p=document.getElementById('loginpass').value.trim();
    if ((u==='bob@mail.com')&& p==='bobpass')
    {
        currentUser= u;
        document.getElementById('loginoverlay').classList.remove('open');
        syncNav();
        toast('Welcome back Bob!');
        showFav();
    }
    else{
        document.getElementById('loginerror').style.display='block';
    }
}

function logout(){
    currentUser= null;
    syncNav();
    switchTab('search');
}

function syncNav(){
    const in_=!!currentUser;

    document.getElementById('btnlogin').style.display=in_?'none':'';
    document.getElementById('btnfav').style.display=in_?'' : 'none';
    document.getElementById('btnlogout').style.display=in_?'' : 'none';
}

function getFavs(){
    return favourites[currentUser]||[];
}

function isFav(id){
    return getFavs().includes(String(id));
}

function toggleFav(id,name){
    if (!currentUser)
    {
        openLogin();
        return false;
    }

    const list= getFavs();
    const index = list.indexOf(String(id));

    if (index === -1) 
    { 
        list.push(String(id)); 
        toast(`Saved "${name}"`);
    }
    else 
    { 
        list.splice(index, 1); 
        toast(`Removed "${name}"`); 
    }

    favourites[currentUser] = list;
    localStorage.setItem('favourites',JSON.stringify(favourites));
    return index === -1;
}

function showFav()
{
    switchTab('favs');
}

function switchTab(tab) {
  document.getElementById('panelsearch').style.display = tab === 'search' ? '' : 'none';
  document.getElementById('panelfavs').style.display  = tab === 'favs'   ? '' : 'none';
  const searchTab = document.getElementById('tabsearch');
  const favsTab = document.getElementById('tabfavs');
  if (tab === 'search') {
        searchTab.className = 'tabactive';
        favsTab.className = 'tab';
    } 
    else {
        searchTab.className = 'tab';
        favsTab.className = 'tabactive';
    }

    const panelSearch = document.getElementById('panelsearch');
    const panelFavs = document.getElementById('panelfavs');
    const tabSearch = document.getElementById('tabsearch');
    const tabFavs = document.getElementById('tabfavs');


    panelSearch.style.display = tab === 'search' ? '':'none';
    panelFavs.style.display = tab === 'favs' ? '' : 'none';

    tabSearch.className = tab === 'search' ? 'tabactive' : 'tab';
    tabFavs.className = tab === 'favs' ? 'tabactive' : 'tab';
    
    if (tab === 'favs'){
        renderFavs();
        }
    }

function debounceSearch() {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(doSearch, 400);
}
function setFilter(val, el) {
  activeFilter = val;
  document.querySelectorAll('.filterrow span').forEach((span) => {
        span.className = 'btncat';
    });

    el.className = 'btncatactive';
    doSearch();
}

async function doSearch() {
  const q = document.getElementById('searchinput').value.trim();
  const grid = document.getElementById('results-grid');
  grid.innerHTML = '<div class="spinner"></div>';

  document.querySelector('#panelsearch .section-title').textContent =
        q ? `Results for "${q}"` : 'Popular Recipes';

  let meals = [];

  try {
    if (q) {
      const r1 = await fetch(`${API}/search.php?s=${encodeURIComponent(q)}`).then(r => r.json());
      meals = r1.meals || [];

      if (meals.length === 0) {
        const r2 = await fetch(`${API}/filter.php?i=${encodeURIComponent(q)}`).then(r => r.json());
        meals = r2.meals || [];
      }
    } else {
      const letters = ['a', 'b', 'c', 'm', 's'];
      const results = await Promise.all(
        letters.map(l => fetch(`${API}/search.php?f=${l}`).then(r => r.json()))
      );
      results.forEach(r => {
        if (r.meals) 
            meals.push(...r.meals);
      });
    }

    if (activeFilter) {
      meals = meals.filter(m =>
        (m.strCategory || '').toLowerCase() === activeFilter.toLowerCase()
      );
    }

    const seen = new Set();
    meals = meals.filter(m => {
      if (seen.has(m.idMeal)) return false;
      seen.add(m.idMeal);
      return true;
    });
  } catch (e) {
    console.error(e);
    meals = [];
  }

  renderGrid(meals, grid);
}

function renderGrid(meals, container) {
  if (!meals || meals.length === 0) {
    container.innerHTML = `
      <div class="empty" style="grid-column:1/-1">
        <div class="icon">🍽️</div>
        <p>No meals found. Try a different search.</p>
      </div>`;
    return;
  }

  container.innerHTML = meals.slice(0, 40).map(m => cardHTML(m)).join('');
}

function cardHTML(m) {
  const fav = isFav(m.idMeal);
  return `
  <div class="card" onclick="openDetail('${m.idMeal}')">
    <img src="${m.strMealThumb}" alt="${m.strMeal}" loading="lazy" />
    <div class="card-body">
      <div class="card-name">${m.strMeal}</div>
      <div class="card-meta">${m.strCategory || ''}</div>
      <div class="card-actions">
        <button class="fav-btn ${fav ? 'active' : ''}" onclick="event.stopPropagation();handleFav('${m.idMeal}','${m.strMeal.replace(/'/g, "\\'")}',this)">
          ${fav ? '❤ Saved' : '♡ Save'}
        </button>
      </div>
    </div>
  </div>`;
}

function handleFav(id, name, btn) {
  const added = toggleFav(id, name);
  if (added === false && !currentUser) return;
  btn.classList.toggle('active', added);
  btn.textContent = added ? '❤ Saved' : '♡ Save';
  if (document.getElementById('panelfavs').style.display !== 'none') 
    renderFavs();
}

async function renderFavs() {
  const grid = document.getElementById('favs-grid');
  const ids = getFavs();

  if (!currentUser) {
    grid.innerHTML = 
    `<div class="empty" style="grid-column:1/-1">
        <div class="icon">🔒</div>
        <p>Login to see your favorites.</p>
    </div>`;
    return;
  }

  if (ids.length === 0) {
    grid.innerHTML = 
    `<div class="empty" style="grid-column:1/-1">
        <div class="icon">❤</div>
        <p>No favorites yet. Save some recipes!</p>
    </div>`;
    return;
  }

  grid.innerHTML = '<div class="spinner"></div>';

  const meals = await Promise.all(
    ids.map(id =>
      fetch(`${API}/lookup.php?i=${id}`)
        .then(r => r.json())
        .then(d => d.meals?.[0])
    )
  );

  renderGrid(meals.filter(Boolean), grid);
}

async function openDetail(id) {
  document.getElementById('detailoverlay').classList.add('open');
  document.getElementById('dname').textContent = 'Loading…';
  document.getElementById('img').src = '';
  document.getElementById('d-ingredients').innerHTML = '';
  document.getElementById('d-instructions').textContent = '';
  document.getElementById('dglass').textContent = '';

  const data = await fetch(`${API}/lookup.php?i=${id}`).then(r => r.json());
  const m = data.meals?.[0];
  if (!m) return;

  currentMeal = m;

  document.getElementById('img').src = m.strMealThumb;
  document.getElementById('dname').textContent = m.strMeal;
  document.getElementById('dcategory').textContent = `${m.strCategory || ''} ${m.strArea ? '· ' + m.strArea : ''}`;
  document.getElementById('d-instructions').textContent = m.strInstructions || '';

  const ingHtml = [];
  for (let i = 1; i <= 20; i++) {
    const ing = m[`strIngredient${i}`];
    const mea = m[`strMeasure${i}`];
    if (ing && ing.trim()) {
      ingHtml.push(`<span class="ingredient-tag">${mea ? mea.trim() + ' ' : ''}${ing}</span>`);
    }
  }

  document.getElementById('d-ingredients').innerHTML = ingHtml.join('');

  const btn = document.getElementById('dfav-btn');
  btn.textContent = isFav(m.idMeal) ? '❤ Saved' : '♡ Save to Favorites';
}
  
function closeDetails(e) 
{
    if (e.target === document.getElementById('detailoverlay')) {
        document.getElementById('detailoverlay').classList.remove('open');
    }
}

function closeDetailBtn() {
    document.getElementById('detailoverlay').classList.remove('open');
}

function saveFavFromDetail() {
    if (!currentMeal) return;

    const added = toggleFav(currentMeal.idMeal, currentMeal.strMeal);
    if (added === false && !currentUser) return;

    document.getElementById('dfav-btn').textContent =
        isFav(currentMeal.idMeal) ? '❤ Saved' : '♡ Save to Favourites';

    if (document.getElementById('panelfavs').style.display !== 'none') {
        renderFavs();
    }
}

function toast(message) {
    const toastBox = document.getElementById('toast');
    toastBox.textContent = message;
    toastBox.classList.add('show');

    setTimeout(() => {
        toastBox.classList.remove('show');
    }, 2000);
}

syncNav();
switchTab('search');
doSearch();

</script>

</body>
</html>
