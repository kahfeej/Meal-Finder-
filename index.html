<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>  </title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#ff7043">

</head>
<style>
    
    
</style>

<body>
<nav>
    <div class="logo"> </div>
    <div class="navtab">
        <button class="btn-primary" id="btnlogin" onclick="openLogin()">Login</button>
        <button class="btn-secondary" id="btnfav" onclick="showFav()">Favourites</button>
        <button class="btn-secondary" id="btnlogout" onclick="logout()">Logout</button>
    </div>
</nav>

<section id="hero">
    <h1>Your next meal starts here</h1>
    <h4>Discover recipes made simple </h4>
    <div class="search">
        <input type="text" id="searchinput" placeholder="Search by meal or ingredient" oninput="debounceSearch()"/>
        <button class="btn-secondary" id="btnsearch" onclick="doSearch()">Search</button>
    </div>
    <div class="filterrow">
        <span class="btncatactive" onclick="setFilter('', this)">All</span>
        <span class="btncat" onclick="setFilter('Beef', this)">Beef</span>
        <span class="btncat" onclick="setFilter('Chicken', this)">Chicken</span>
        <span class="btncat" onclick="setFilter('Seafood', this)">Seafood</span>
        <span class="btncat" onclick="setFilter('Vegetarian', this)">Vegetarian</span>
        <span class="btncat" onclick="setFilter('Dessert', this)">Dessert</span>
    </div>
</section>

<main class="mainsection">
    <div class="tabs" id="maintabs">
        <button class="tabactive" id="tabsearch" onclick="switchTab(search)">Results</button>
        <button class="tab" id="tabfavs" onclick="switchTab(favs)">My Favourites</button>
    </div>
    <div id="panelsearch">
        <div class="section-title">Popular Recipes</div>
        <div class="grid" id="results-grid">
            <div class="spinner"></div>
        </div>
    </div>
    <div id="panelfavs">
       <div class="section-title">My Saved Recipes</div>
        <div class="grid" id="favs-grid"></div> 
    </div>
</main>

<div class="overlay" id="detailoverlay" onclick="closeDetails(event)">
    <div class="modal" id="detailmodal">
        <img id="img" class="modalimg" src="" alt=""/>
        <div class="modalbody">
            <button class="modalclose" onclick="closeDetailBtn()">✕</button>
            <h2 id="dname"></h2>
            <span class="badge" id="dcategory"></span>
            <h3>Ingredients</h3>
            <div class="ingredients" id="d-ingredients"></div>
            <h3>Instructions</h3>
            <p class="instructions" id="d-instructions"></p>
            <div class="savefav">
                <button class="btn-primary" id="dfav-btn" onclick="saveFavFromDetail()">Save to Favourites</button>
                <span id="dglass"></span>
            </div>
        </div>
    </div>
</div>

<div class="overlay" id="loginoverlay" onclick="closeLogin(event)">
    <div class="modal" id="loginmodal">
        <div class="modalbody">
            <button class="modalclose" onclick="document.getElementById('loginoverlay').classList.remove('open')">✕</button>
            <h2>Welcome Back</h2>
            <div class="loginform">
                <label>
                    Email
                    <input type="text" id="loginuser" placeholder="bob@mail.com"/>
                </label>
                <label>
                    Password
                    <input type="text" id="loginpass" placeholder="bobpass"/>
                </label>
                <p class="loginerror" id="loginerror">Invalid information</p>
                <button class="btn-primary" onclick="doLogin()">Login</button>
            </div>
        </div>
    </div>
</div>

<div id="toast">Saved</div>


<script>
const API= 'https://www.themealdb.com/api/json/v1/1';
let currentUser= null,
    favourites= {},
    currentMeal= null;


function openLogin(){
    document.getElementById('loginoverlay').classList.add('open');
    document.getElementById('loginerror').style.display='none';
}

function closeLogin(e){
    if (e.target===document.getElementById('loginoverlay'))
        document.getElementById('loginoverlay').classList.remove('open');
}

function doLogin(){
    const u=document.getElementById('loginuser').value.trim().toLowerCase();
    const p=document.getElementById('loginpass').value.trim();
    if ((u==='bob@mail.com')&& p==='bobpass')
    {
        document.getElementById('loginoverlay').classList.remove('open');
        syncNav();
        toast('Welcome back Bob!');
        showFavs();
    }
    else{
        document.getElementById('loginerror').style.display='block';
    }
}

function logout(){
    currentUser= null;
    syncNav();
    switchTab('search');
}

function syncNav(){
    const in_=!!currentUser;

    document.getElementById('btnlogin').style.display=in_?'none':'';
    document.getElementById('btnfavs').style.display=in_?'none':'';
    document.getElementById('btnlogout').style.display=in_?'none':'';
}

function getFavs(){
    return favourites[currentUser]||[];
}

function isFav(id){
    return getFavs().includes(String(id));
}

function toggleFav(id,name){
    if (!currentuser)
    {
        openLogin();
        return false;
    }

    const list= getFavs();
    const index = list.indexOf(String(id));
    if (index === -1) 
    { 
        list.push(String(id)); 
        toast(`Saved "${name}"`);
    }
    else 
    { 
        list.splice(index, 1); 
        toast(`Removed "${name}"`); 
    }

    favorites[currentUser] = list;
    localStorage.setItem('favorites',JSON.stringify(favorites));
    return index === -1;
}

function showFavorites()
{
    switchTab('favs');
}

function switchTab(tab) {
  document.getElementById('panel-search').style.display = tab === 'search' ? '' : 'none';
  document.getElementById('panel-favs').style.display  = tab === 'favs'   ? '' : 'none';
  document.getElementById('tab-search').classList.toggle('active', tab === 'search');
  document.getElementById('tab-favs').classList.toggle('active', tab === 'favs');
  if (tab === 'favs') renderFavs();
}

/* ─────────────────────────────────────────────
   SEARCH
───────────────────────────────────────────── */
function debounceSearch() {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(doSearch, 400);
}
function setFilter(val, el) {
  activeFilter = val;
  document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  doSearch();
}
async function doSearch() {
  const q = document.getElementById('search-input').value.trim();
  const grid = document.getElementById('results-grid');
  grid.innerHTML = '<div class="spinner"></div>';

  document.getElementById('panel-search').querySelector('.section-title').textContent =
    q ? `Results for "${q}"` : 'Popular Recipes';

  let meals = [];

  try {
    if (q) {
      const r1 = await fetch(`${API}/search.php?s=${encodeURIComponent(q)}`).then(r => r.json());
      meals = r1.meals || [];

      if (meals.length === 0) {
        const r2 = await fetch(`${API}/filter.php?i=${encodeURIComponent(q)}`).then(r => r.json());
        meals = r2.meals || [];
      }
    } else {
      const letters = ['a', 'b', 'c', 'm', 's'];
      const results = await Promise.all(
        letters.map(l => fetch(`${API}/search.php?f=${l}`).then(r => r.json()))
      );
      results.forEach(r => {
        if (r.meals) meals.push(...r.meals);
      });
    }

    if (activeFilter) {
      meals = meals.filter(m =>
        (m.strCategory || '').toLowerCase() === activeFilter.toLowerCase()
      );
    }

    const seen = new Set();
    meals = meals.filter(m => {
      if (seen.has(m.idMeal)) return false;
      seen.add(m.idMeal);
      return true;
    });
  } catch (e) {
    console.error(e);
    meals = [];
  }

  renderGrid(meals, grid);
}
/* ─────────────────────────────────────────────
   RENDER
───────────────────────────────────────────── */
function renderGrid(meals, container) {
  if (!meals || meals.length === 0) {
    container.innerHTML = `<div class="empty" style="grid-column:1/-1"><div class="icon">🍽️</div><p>No meals found. Try a different search.</p></div>`;
    return;
  }
  container.innerHTML = meals.slice(0, 40).map(m => cardHTML(m)).join('');
}

function cardHTML(m) {
  const fav = isFav(m.idMeal);
  return `
  <div class="card" onclick="openDetail('${m.idMeal}')">
    <img src="${m.strMealThumb}" alt="${m.strMeal}" loading="lazy" />
    <div class="card-body">
      <div class="card-name">${m.strMeal}</div>
      <div class="card-meta">${m.strCategory || ''}</div>
      <div class="card-actions">
        <button class="fav-btn ${fav ? 'active' : ''}" onclick="event.stopPropagation();handleFav('${m.idMeal}','${m.strMeal.replace(/'/g, "\\'")}',this)">
          ${fav ? '❤ Saved' : '♡ Save'}
        </button>
      </div>
    </div>
  </div>`;
}

function handleFav(id, name, btn) {
  const added = toggleFav(id, name);
  if (added === false && !currentUser) return;
  btn.classList.toggle('active', added);
  btn.textContent = added ? '❤ Saved' : '♡ Save';
  if (document.getElementById('panel-favs').style.display !== 'none') renderFavs();
}

/* ─────────────────────────────────────────────
   FAVORITES PANEL
───────────────────────────────────────────── */
async function renderFavs() {
  const grid = document.getElementById('favs-grid');
  const ids = getFavs();

  if (!currentUser) {
    grid.innerHTML = `<div class="empty" style="grid-column:1/-1"><div class="icon">🔒</div><p>Login to see your favorites.</p></div>`;
    return;
  }

  if (ids.length === 0) {
    grid.innerHTML = `<div class="empty" style="grid-column:1/-1"><div class="icon">❤</div><p>No favorites yet. Save some recipes!</p></div>`;
    return;
  }

  grid.innerHTML = '<div class="spinner"></div>';

  const meals = await Promise.all(
    ids.map(id =>
      fetch(`${API}/lookup.php?i=${id}`)
        .then(r => r.json())
        .then(d => d.meals?.[0])
    )
  );

  renderGrid(meals.filter(Boolean), grid);
}
/* ─────────────────────────────────────────────
   DETAIL MODAL
───────────────────────────────────────────── */
async function openDetail(id) {
  document.getElementById('detail-overlay').classList.add('open');
  document.getElementById('d-name').textContent = 'Loading…';
  document.getElementById('d-img').src = '';
  document.getElementById('d-ingredients').innerHTML = '';
  document.getElementById('d-instructions').textContent = '';

  const data = await fetch(`${API}/lookup.php?i=${id}`).then(r => r.json());
  const m = data.meals?.[0];
  if (!m) return;

  currentMeal = m;

  document.getElementById('d-img').src = m.strMealThumb;
  document.getElementById('d-name').textContent = m.strMeal;
  document.getElementById('d-category').textContent = `${m.strCategory || ''} ${m.strArea ? '· ' + m.strArea : ''}`;
  document.getElementById('d-glass').textContent = '';
  document.getElementById('d-instructions').textContent = m.strInstructions || '';

  const ingHtml = [];
  for (let i = 1; i <= 20; i++) {
    const ing = m[`strIngredient${i}`];
    const mea = m[`strMeasure${i}`];
    if (ing && ing.trim()) {
      ingHtml.push(`<span class="ingredient-tag">${mea ? mea.trim() + ' ' : ''}${ing}</span>`);
    }
  }

  document.getElementById('d-ingredients').innerHTML = ingHtml.join('');

  const btn = document.getElementById('d-fav-btn');
  btn.textContent = isFav(m.idMeal) ? '❤ Saved' : '♡ Save to Favorites';
  btn.classList.toggle('btn-ghost', isFav(m.idMeal));
}


</script>

</body>
</html>
